name: ordarat_admin
description: "سیستەمی بەڕێوەبردنی ئۆردەرات - Admin Panel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # ڤێرژنە نوێیەکانی فایەربەیس کە کێشەی ئیرۆرەکەی گیتهاپیان تێدا چارەسەر کراوە
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  http: ^1.1.2
  url_launcher: ^6.2.2
  
  pdf: ^3.11.0
  printing: ^5.11.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
