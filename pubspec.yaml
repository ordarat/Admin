name: ordarat_admin
description: "سیستەمی بەڕێوەبردنی ئۆردەرات - Admin Panel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase Packages (بۆ بەستنەوەی داتابەیس و چوونەژوورەوە)
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  
  # Map Packages (بۆ نەخشەی ڕاستەقینەی شۆفێران)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Utility Packages (بۆ ناردنی نامە و پەیوەندیکردن)
  http: ^1.1.2
  url_launcher: ^6.2.2
  
  # PDF and Reports Packages (بۆ دروستکردنی ڕاپۆرتی دارایی و ساڵنامە)
  pdf: ^3.11.0
  printing: ^5.11.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
