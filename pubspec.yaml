name: admin_panel
description: Admin Dashboard for Ordarat System.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # پاکێجەکانی فایەربەیس
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # پاکێجەکانی نەخشەی ئەدمین
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # پاکێجەکانی هەڵبژاردنی وێنە و ناردنی بۆ ImgBB
  image_picker: ^1.0.7
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
