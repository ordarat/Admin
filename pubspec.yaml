name: ordarat_admin
description: "Ordarat Admin Dashboard Panel."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # پاکێجە بنەڕەتییەکان
  cupertino_icons: ^1.0.8
  
  # پاکێجەکانی فایەربەیس
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  
  # پاکێجەکانی نەخشەی راستەوخۆ
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # پاکێجی دروستکردنی گرافیک و راپۆرتی دارایی (نوێ)
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
